<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .search-header { background: white; padding: 20px 0; border-bottom: 1px solid #dee2e6; }
        .search-input { border-radius: 12px 0 0 12px !important; background-color: #f1f3f4; border: none; padding: 12px 20px; }
        .search-btn { border-radius: 0 12px 12px 0 !important; padding: 0 30px; }
        .result-item { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid #eef0f2; }
        .result-title { color: #1a0dab; font-size: 1.25rem; text-decoration: none; font-weight: 500; }
        .result-url { color: #70757a; font-size: 0.875rem; display: block; margin-top: 8px; }
    </style>
</head>
<body>

<div id="app">
    <header class="search-header mb-4">
        <div class="container">
            <h4 class="mb-3">🔍 Full Article Search Demo</h4>
            <div class="input-group">
                <input type="text" v-model="query" @keyup.enter="fetchResults" class="form-control search-input" placeholder="Search...">
                <button @click="fetchResults" class="btn btn-primary search-btn">Search Full Article</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div v-if="error" class="alert alert-danger" role="alert">
            {{ error }}
        </div>

        <div v-if="loading" class="text-center py-4">
            <div class="spinner-border text-primary"></div>
        </div>

        <div v-else>
            <div v-for="article in articles" :key="article.id" class="result-item">
                <a :href="article.sourcePageUrl" target="_blank" class="result-title">{{ article.title }} ({{ article.section}} Part {{article.chunkIndex}})</a>
                <p class="mt-2 text-secondary">{{ truncateText(article.content, 50) }}</p>
                <span class="result-url"><a :href="article.sourcePageUrl" target="_blank" class="result-title">{{ article.sourcePageUrl }}</a></span>
            </div>
            
            <div v-if="articles.length === 0 && hasSearched && !error" class="text-center text-muted">
                No results found.
            </div>
        </div>
    </main>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            const query = ref('');
            const articles = ref([]);
            const loading = ref(false);
            const error = ref(null);
            const hasSearched = ref(false);

            const fetchResults = async () => {
                if (!query.value.trim()) {
                    error.value = "Please enter a search term.";
                    return;
                }

                loading.value = true;
                error.value = null;
                hasSearched.value = true;

                try {
                    const response = await axios.get(`http://localhost:5000/api/searchfullarticle`, {
                        params: { query: query.value }
                    });
                    articles.value = response.data;
                } catch (err) {
                    // Extract error message from API response if available
                    console.log("err");
                    console.log(err);
                    error.value = err.response?.data?.error || "Unable to connect to the server.";
                    articles.value = [];
                } finally {
                    loading.value = false;
                }
            };
            
            const truncateText = (text, wordLimit) => {
                if (!text) return '';
                const words = text.split(' ');
                if (words.length <= wordLimit) return text;
                return words.slice(0, wordLimit).join(' ') + '...';
            };

            return { query, articles, loading, error, hasSearched, fetchResults, truncateText };
        }
    }).mount('#app');
</script>
</body>
</html>
