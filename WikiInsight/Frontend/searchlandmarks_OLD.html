<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue 3 Search Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .search-container { max-width: 800px; margin: 50px auto; }
        .card-img-top { height: 200px; object-fit: cover; }
        .article-card { transition: transform 0.2s; }
        .article-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<div id="app" class="container">
    <div class="search-container text-center">
        <h1 class="mb-4">Article Search</h1>
        
        <div class="input-group mb-5 shadow-sm">
            <input 
                type="text" 
                v-model="searchQuery" 
                @keyup.enter="handleSearch"
                class="form-control form-control-lg" 
                placeholder="Search for articles (e.g., 'Space', 'Tech')..."
            >
            <button @click="handleSearch" class="btn btn-primary btn-lg" type="button">
                Search
            </button>
        </div>

        <div v-if="loading" class="text-center my-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div v-else class="row g-4">
            <div v-if="articles.length === 0 && hasSearched" class="col-12">
                <p class="text-muted">No articles found. Try a different keyword.</p>
            </div>

            <div v-for="article in articles" :key="article.id" class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm article-card">
                    <img :src="article.image || 'https://via.placeholder.com/400x200'" class="card-img-top" alt="Thumbnail">
                    <div class="card-body">
                        <h5 class="card-title">{{ article.title }}</h5>
                        <p class="card-text text-secondary">{{ article.description }}</p>
                    </div>
                    <div class="card-footer bg-white border-0 pb-3">
                        <a :href="article.url" target="_blank" class="btn btn-outline-primary btn-sm w-100">Read More</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            const searchQuery = ref('');
            const articles = ref([]);
            const loading = ref(false);
            const hasSearched = ref(false);

            const handleSearch = async () => {
                if (!searchQuery.value.trim()) return;

                loading.value = true;
                hasSearched.value = true;
                
                try {
                    // Note: Replace this URL with your actual API endpoint
                    // Using a placeholder API for demonstration:
                    const response = await axios.get(`https://jsonplaceholder.typicode.com/posts?q=${searchQuery.value}`);
                    
                    // Mapping the mock data to our card structure
                    articles.value = response.data.map(item => ({
                        id: item.id,
                        title: item.title,
                        description: item.body.substring(0, 100) + '...',
                        url: '#',
                        image: `https://picsum.photos/seed/${item.id}/400/200`
                    }));
                } catch (error) {
                    console.error("Error fetching articles:", error);
                    alert("Failed to fetch articles. Check console for details.");
                } finally {
                    loading.value = false;
                }
            };

            return {
                searchQuery,
                articles,
                loading,
                hasSearched,
                handleSearch
            };
        }
    }).mount('#app');
</script>

</body>
</html>
